name: UCWS Project Wall Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Sync UCWS Project Wall
        env:
          EPIC_TOKEN: ${{ secrets.EPIC_TOKEN }}
        run: node tools/sync-ucws-project-wall.mjs

      - name: Commit updated project wall data
        run: |
          if git diff --quiet -- data/ucws-project-wall.json data/ucws-project-wall.md; then
            echo "No Project Wall changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ucws-project-wall.json data/ucws-project-wall.md
          git commit -m "chore: sync UCWS project wall"
          git push
