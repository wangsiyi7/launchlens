<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">汇young LaunchLens logo</title>
  <desc id="desc">A lizard-toned LaunchLens emblem for team 汇young, integrating Annie, Yiang, and Hu Yinghui through A, Y, and H initials.</desc>
  <defs>
    <radialGradient id="skinField" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#93c98a"/>
      <stop offset="44%" stop-color="#386849"/>
      <stop offset="76%" stop-color="#1c3429"/>
      <stop offset="100%" stop-color="#0c1411"/>
    </radialGradient>
    <linearGradient id="sandLight" x1="88" y1="78" x2="438" y2="442" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e7d7ae"/>
      <stop offset="48%" stop-color="#8ee0a7"/>
      <stop offset="100%" stop-color="#4ab0a2"/>
    </linearGradient>
    <linearGradient id="lizardBody" x1="58" y1="318" x2="462" y2="196" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b2119"/>
      <stop offset="32%" stop-color="#315a3c"/>
      <stop offset="68%" stop-color="#78a55f"/>
      <stop offset="100%" stop-color="#152a22"/>
    </linearGradient>
    <pattern id="scales" width="34" height="30" patternUnits="userSpaceOnUse">
      <path d="M17 2c8 0 14 7 14 15s-6 11-14 11S3 25 3 17 9 2 17 2z" fill="none" stroke="#d7e7b8" stroke-opacity=".16" stroke-width="1.2"/>
      <circle cx="17" cy="17" r="2.2" fill="#d7e7b8" fill-opacity=".12"/>
    </pattern>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#07100d" flood-opacity=".55"/>
    </filter>
    <filter id="markGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.54 0 0 0 0 0.88 0 0 0 0 0.66 0 0 0 .75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .node { transform-box: fill-box; transform-origin: center; animation: breathe 4.8s ease-in-out infinite; }
      .node.y { animation-delay: .55s; }
      .node.h { animation-delay: 1.1s; }
      @keyframes breathe {
        0%, 100% { opacity: .86; }
        50% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .node { animation: none; }
      }
    </style>
  </defs>

  <rect width="512" height="512" rx="90" fill="#09110f"/>
  <rect x="18" y="18" width="476" height="476" rx="76" fill="url(#skinField)"/>
  <rect x="18" y="18" width="476" height="476" rx="76" fill="url(#scales)" opacity=".78"/>
  <path d="M40 390c88-98 158-151 247-163 63-9 108 7 184-40-29 61-82 98-156 109-95 14-179 41-275 127z" fill="#06100d" opacity=".3"/>

  <g filter="url(#softShadow)">
    <path
      d="M60 331c58-48 117-69 178-62 40 5 72 23 110 11 31-10 55-39 103-42 18-1 34 2 47 8-27 10-48 25-63 45-25 32-59 49-105 47-37-1-69-18-110-21-55-4-105 11-160 51 16-16 16-23 0-37z"
      fill="url(#lizardBody)"
    />
    <path
      d="M77 296c44-56 105-82 184-79 55 2 92 27 134 22 27-3 52-15 76-36-8 45-39 77-93 96-49 18-91 8-136-2-57-13-108-7-165 33 7-12 7-23 0-34z"
      fill="#9fca73"
      opacity=".38"
    />
    <path d="M405 222c28-30 59-46 94-50-20 27-38 48-56 63" fill="none" stroke="#9bd6b6" stroke-opacity=".5" stroke-width="14" stroke-linecap="round"/>
    <path d="M75 328c-24 7-42 18-55 35 20-3 39 1 56 12" fill="#081510"/>
    <circle cx="408" cy="235" r="6.6" fill="#f8edcf"/>
  </g>

  <g filter="url(#markGlow)">
    <circle cx="256" cy="238" r="116" fill="#101b17" fill-opacity=".42" stroke="url(#sandLight)" stroke-width="20"/>
    <path d="M329 312l70 70" stroke="#e7b962" stroke-width="28" stroke-linecap="round"/>
    <path d="M210 247l94-94m0 0v67m0-67h-67" fill="none" stroke="#c8f7e8" stroke-opacity=".68" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="256" y="252" text-anchor="middle" fill="#fff6df" stroke="#0b1713" stroke-width="3" paint-order="stroke fill" font-family="'Segoe UI', 'Microsoft YaHei', Arial, sans-serif" font-size="48" font-weight="800" letter-spacing="0">汇young</text>
  <path d="M171 367c44-26 93-34 147-24" fill="none" stroke="#f8f1df" stroke-opacity=".26" stroke-width="4" stroke-linecap="round"/>

  <g font-family="'Segoe UI', Arial, sans-serif" font-weight="900" text-anchor="middle">
    <g class="node a">
      <circle cx="160" cy="361" r="24" fill="#0b1713" stroke="#e7d7ae" stroke-width="3"/>
      <text x="160" y="370" fill="#e7d7ae" font-size="26">A</text>
    </g>
    <g class="node y">
      <circle cx="256" cy="340" r="25" fill="#0b1713" stroke="#8ee0a7" stroke-width="3"/>
      <text x="256" y="349" fill="#8ee0a7" font-size="27">Y</text>
    </g>
    <g class="node h">
      <circle cx="352" cy="361" r="24" fill="#0b1713" stroke="#7fd4dd" stroke-width="3"/>
      <text x="352" y="370" fill="#7fd4dd" font-size="26">H</text>
    </g>
  </g>
</svg>
